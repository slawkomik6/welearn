<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeLearn — Вхід</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: #534AB7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(83,74,183,0.3); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-text { font-size: 36px; font-weight: 800; color: #534AB7; }
    .logo-sub { color: #888; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #534AB7; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 2px solid #EEEDFE; border-radius: 10px; font-size: 15px; font-family: 'Nunito', sans-serif; outline: none; transition: border 0.2s; }
    input:focus { border-color: #534AB7; }
    .btn { width: 100%; padding: 14px; background: #534AB7; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #3C3489; }
    .error { background: #FCEBEB; color: #A32D2D; padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; }
    .parent-link { text-align: center; margin-top: 20px; }
    .parent-link a { color: #534AB7; font-size: 14px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">WeLearn</div>
      <div class="logo-sub">Система оцінювання</div>
    </div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Логін</label>
        <input type="text" name="username" placeholder="Введіть логін" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Введіть пароль" required>
      </div>
      <button type="submit" class="btn">Увійти</button>
    </form>
    <div class="parent-link">
      <a href="/parent">Я батько/мати → Переглянути оцінки</a>
    </div>
  </div>
</body>
</html>
