<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeLearn — Для батьків</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: #534AB7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-text { font-size: 36px; font-weight: 800; color: #534AB7; }
    .logo-sub { color: #888; font-size: 14px; margin-top: 4px; }
    .desc { background: #EEEDFE; border-radius: 10px; padding: 14px 16px; margin-bottom: 24px; font-size: 14px; color: #534AB7; text-align: center; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #534AB7; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 2px solid #EEEDFE; border-radius: 10px; font-size: 18px; font-family: 'Nunito', sans-serif; outline: none; text-align: center; letter-spacing: 4px; font-weight: 700; }
    input:focus { border-color: #534AB7; }
    .btn { width: 100%; padding: 14px; background: #534AB7; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; }
    .btn:hover { background: #3C3489; }
    .error { background: #FCEBEB; color: #A32D2D; padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; text-align: center; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #534AB7; font-size: 14px; text-decoration: none; font-weight: 600; }
  </style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#534AB7">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">WeLearn</div>
      <div class="logo-sub">Перегляд оцінок</div>
    </div>
    <div class="desc">Введіть унікальний код вашої дитини який надав вчитель</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Код дитини</label>
        <input type="text" name="code" placeholder="ABC123" required autocomplete="off" maxlength="10">
      </div>
      <button type="submit" class="btn">Переглянути оцінки</button>
    </form>
    <div class="back-link">
      <a href="/">← Повернутись до входу</a>
    </div>
  </div>
</body>
</html>
